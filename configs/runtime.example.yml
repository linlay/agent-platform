# Runtime integration config. Copy to configs/runtime.yml to customize locally.

# paths:
#   # AP_RUNTIME_DIR controls the common runtime root. Use these only when a
#   # specific runtime subdirectory must live outside that root.
#   registries-dir: ./runtime/registries
#   tools-dir: ./runtime/tools
#   owner-dir: ./runtime/owner
#   agents-dir: ./runtime/agents
#   teams-dir: ./runtime/teams
#   root-dir: ./runtime/root
#   automations-dir: ./runtime/automations
#   chats-dir: ./runtime/chats
#   memory-dir: ./runtime/memory
#   pan-dir: ./runtime/pan
#   skills-market-dir: ./runtime/skills-market

skills:
  max-prompt-chars: 8000

auth:
  enabled: true
  # jwks-uri:
  # issuer:
  # jwks-cache-seconds: 0

resource:
  ticket-ttl-seconds: 86400

budget:
  # 单次 run 总耗时上限：一条用户消息触发的 agent 执行，从开始到最终回答结束。
  timeout: 3600
  max-steps: 100
  model:
    max-calls: 100
    # 模型流式 idle 超时：首个响应 chunk 或任意两个 chunk 之间超过该秒数无响应则报错。
    timeout: 60
    retry-count: 3
  tool:
    max-calls: 100
    # 单次后端工具调用硬上限：bash/file/external 等工具不能超过该秒数。
    timeout: 600
    retry-count: 0
  hitl:
    timeout: 600
    question:
      timeout: 600
    approval:
      timeout: 600
    form:
      timeout: 600
    plan:
      timeout: 600

automation:
  enabled: true
  default-zone-id:
  pool-size: 4

memory:
  enabled: true
  db-file-name: memory.db
  context-top-n: 5
  context-max-chars: 4000
  search-default-limit: 10
  hybrid-vector-weight: 0.7
  hybrid-fts-weight: 0.3
  dual-write-markdown: true

container-hub:
  base-url: ${AP_CONTAINER_HUB_BASE_URL:http://host.docker.internal:11960}

  # Prefer deployment-rendered YAML or an external Secret for Bearer auth.
  # auth-token:
  default-environment-id:
  request-timeout: 300
  default-sandbox-level: run
  agent-idle-timeout: 600
  destroy-queue-delay: 5

  # Default mounts come from runtime directory config:
  # /workspace -> AP_RUNTIME_CHATS_DIR/<chatId> (rw)
  # /root      -> paths.root-dir (rw)
  # /skills    -> paths.agents-dir/<agentKey>/skills (ro, only run/agent; global skips it)
  # /pan       -> AP_RUNTIME_PAN_DIR (rw)
  # /agent     -> paths.agents-dir/<agentKey> (ro, required)
  # /owner     -> paths.owner-dir (ro)
  # /memory    -> AP_RUNTIME_MEMORY_DIR/<agentKey> (ro)
  #
  # runtimeConfig.sandboxMounts controls Container Hub session mounts:
  # platform + mode             -> on-demand platform mount; skills-market mounts to /skills-market
  # destination + mode          -> override default mount mode
  # source + destination + mode -> add a custom mount

desktop:
  action:
    host: 127.0.0.1
    port: 11788
    path: /actions/call
    request-timeout: 20

  cdp:
    host: 127.0.0.1
    port: 11788
    path: /cdp/call
    request-timeout: 20

cors:
  enabled: false
  path-pattern: /api/**
  allowed-origin-patterns:
    - http://localhost:8081
  allowed-methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"
  exposed-headers:
    - Content-Type
  allow-credentials: false
  max-age-seconds: 3600

billing:
  currency: CNY

# Runtime integration config. Copy to configs/runtime.yml to customize locally.

server:
  port: 11949

auth:
  enabled: true
  local-public-key-file: configs/local-public-key.pem
  # jwks-uri:
  # issuer:
  # jwks-cache-seconds: 0

budget:
  # 单次 run 总耗时上限：一条用户消息触发的 agent 执行，从开始到最终回答结束。
  timeout: 3600
  model:
    # 模型流式 idle 超时：首个响应 chunk 或任意两个 chunk 之间超过该秒数无响应则报错。
    timeout: 30
  tool:
    # 单次后端工具调用硬上限：bash/file/external 等工具不能超过该秒数。
    timeout: 600
  hitl:
    timeout: 600
    question:
      timeout: 600
    approval:
      timeout: 600
    form:
      timeout: 600
    plan:
      timeout: 600

container-hub:
  base-url: ${AP_CONTAINER_HUB_BASE_URL:http://host.docker.internal:11960}

  # Optional overrides; code defaults apply when omitted.
  # auth-token:
  # default-environment-id:
  # request-timeout: 300
  # default-sandbox-level: run
  # agent-idle-timeout: 600
  # destroy-queue-delay: 5

  # Default mounts come from runtime directory config:
  # /workspace -> CHATS_DIR/<chatId> (rw)
  # /root      -> ROOT_DIR (rw)
  # /skills    -> AGENTS_DIR/<agentKey>/skills (ro, only run/agent; global skips it)
  # /pan       -> PAN_DIR (rw)
  # /agent     -> AGENTS_DIR/<agentKey> (ro, required)
  # /owner     -> OWNER_DIR (ro)
  # /memory    -> MEMORY_DIR/<agentKey> (ro)
  #
  # runtimeConfig.sandboxMounts controls Container Hub session mounts:
  # platform + mode             -> on-demand platform mount; skills-market mounts to /skills-market
  # destination + mode          -> override default mount mode
  # source + destination + mode -> add a custom mount

desktop:
  action:
    host: 127.0.0.1
    port: 11788
    path: /actions/call
    request-timeout: 20

  cdp:
    host: 127.0.0.1
    port: 11788
    path: /cdp/call
    request-timeout: 20

cors:
  enabled: false
  path-pattern: /api/**
  allowed-origin-patterns:
    - http://localhost:8081
  allowed-methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"
  exposed-headers:
    - Content-Type
  allow-credentials: false
  max-age-seconds: 3600

billing:
  currency: CNY

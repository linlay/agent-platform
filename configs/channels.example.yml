# Channel only describes the connection. Agent import/export is declared in
# each agent.yml channelConfig.
# Gateway Agent Card reporting is enabled only for mode: client channels and
# only for explicit agent channelConfig.exports with allow.query: true.

# channels:
#   # Platform actively connects to another platform/adaptor.
#   peer-a:
#     mode: client
#     # transport defaults to websocket.
#     # protocol defaults to platform-ws, the standard request/response/stream/push/error WS frames.
#     endpoint:
#       url: ${PEER_A_WS_URL}
#       tokenEnv: PEER_A_TOKEN
#     heartbeat:
#       interval: 30
#     reconnect:
#       handshakeTimeout: 10
#       min: 1
#       max: 30

#   # Platform exposes /ws/channel for other platforms/adaptors to connect in.
#   # A mode: CHANNEL agent may reuse the latest active connection on this
#   # channel; if no peer is connected, query returns 503.
#   public-entry:
#     mode: server
#     endpoint:
#       path: /ws/channel
#     auth:
#       type: jwt

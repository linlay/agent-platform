# Host shell 默认预设：Unix/macOS 使用 bash -lc；Windows 产物会替换为 PowerShell 预设。
# 目录权限统一放在 configs/access-policy.yml；这里仅保留 shell / 命令 / 超时配置。
# Default host shell preset: Unix/macOS use bash -lc; Windows bundles replace this with a PowerShell preset.
# Path policy lives in configs/access-policy.yml.
working-directory: .
allowed-commands: ls,pwd,cat,head,tail,top,free,df,git,rg,find,echo,printf,sed,awk,grep,wc,sort,uniq,tr,cut,xargs,cd,stat,file,du,test,which,mkdir,touch,cp,mv,rm,ln,chmod,env,date,bash,sh,make,go,npm,yarn,pnpm,node,python,python3,pip,curl,wget
shell-features-enabled: true
shell-executable: bash
shell-args:
  - -lc
  - "{{command}}"
shell-timeout-ms: 30000
max-command-chars: 16000

# Bash 收紧预设：如需回到 strict mode，可保留完整命令白名单但关闭 shell features。
# Strict-mode preset: keep a command allowlist but disable shell features when operators need tighter control.

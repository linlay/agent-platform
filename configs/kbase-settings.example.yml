# KBASE-specific runtime settings.

default-agent:
  # Default modelKey written when creating a new KBASE agent without an
  # explicit modelConfig.modelKey.
  modelKey: deepseek-v4-pro
  # Default reasoning effort written when creating a new KBASE agent without
  # an explicit modelConfig.reasoning.effort.
  reasoningEffort: MEDIUM

embedding:
  providerKey:
  model:
  dimension: 1024
  timeout: 60

refresh:
  debounce: 2s
  reconcile-interval: 10m

extraction:
  timeout: 60s
  max-file-bytes: 52428800

  pdf:
    enabled: true
    backend: poppler
    binary: pdftotext

  docx:
    enabled: true
    backend: native

  pptx:
    enabled: true
    backend: native
    include-notes: true

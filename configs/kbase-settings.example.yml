# KBASE-specific runtime settings.

default-agent:
  # Optional default modelKey for new KBASE agents; leave empty to require explicit configuration.
  modelKey:
  # Optional default reasoning effort for new KBASE agents; leave empty to require explicit configuration.
  reasoningEffort:

embedding:
  providerKey: babelark
  model: text-embedding-v4
  dimension: 1024
  timeout: 60

refresh:
  debounce: 2s
  reconcile-interval: 10m

extraction:
  timeout: 60s
  max-file-bytes: 52428800

  pdf:
    enabled: true
    backend: poppler
    binary: pdftotext

  docx:
    enabled: true
    backend: native

  pptx:
    enabled: true
    backend: native
    include-notes: true

# KBASE-specific runtime settings.

default-agent:
  # Optional default modelKey for new KBASE agents; leave empty to require explicit configuration.
  modelKey:
  # Optional default reasoning effort for new KBASE agents; leave empty to require explicit configuration.
  reasoningEffort:

embedding:
  # Default embedding modelKey for new KBASE agents. This must reference a
  # runtime/registries/models/*.yml model with type: embedding.
  modelKey:

storage:
  # auto keeps SQLite serving until a verified LanceDB generation is active.
  # Use lancedb to require LanceDB or sqlite for emergency rollback.
  engine: auto

migration:
  enabled: true
  max-concurrency: 1
  retain-legacy: true
  shadow-live-percent: 10
  max-replay-queries: 100

index:
  fts:
    base-tokenizer: icu
  vector:
    ann-min-rows: 50000

maintenance:
  optimize-change-threshold: 1000
  optimize-interval: 24h
  version-retention: 168h

refresh:
  debounce: 2s
  reconcile-interval: 10m

extraction:
  timeout: 180s
  max-file-bytes: 314572800

  pdf:
    enabled: true
    backend: poppler
    binary: pdftotext

  docx:
    enabled: true
    backend: native

  pptx:
    enabled: true
    backend: native
    include-notes: true

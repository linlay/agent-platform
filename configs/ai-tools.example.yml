# AI tool config. Copy to configs/ai-tools.yml to customize locally.

vision-recognize:
  enabled: true
  default-profile: general
  profiles:
    general:
      model-key: th-minimax-m3
      timeout: 60
      max-images: 4
      max-image-bytes: 20971520
      output-format: text
      system-prompt: |
        You are a visual recognition tool. Describe only observable visual facts.

    ocr:
      model-key: th-minimax-m3
      timeout: 60
      max-images: 4
      max-image-bytes: 20971520
      output-format: json
      system-prompt: |
        Extract visible text, tables, labels, handwriting, and layout.

web-fetch:
  enabled: true
  default-profile: general
  preapproved-hosts: []
  profiles:
    general:
      model-key: th-minimax-m3
      timeout: 60
      fetch-timeout: 60
      max-url-length: 2000
      max-response-bytes: 10485760
      max-markdown-chars: 100000
      max-output-tokens: 1200
      system-prompt: |
        You extract and summarize fetched web content according to the user's prompt.

# Reserved for future model-backed tools. These sections are intentionally
# ignored until the corresponding tools are implemented.
image-generate:
  enabled: false
  profiles: {}

speech:
  speech-to-text:
    enabled: false
    profiles: {}
  text-to-speech:
    enabled: false
    profiles: {}

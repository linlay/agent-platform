# CODER-specific runtime settings.

default-agent:
  # Optional default modelKey for new CODER agents; leave empty to require explicit configuration.
  modelKey:
  # Optional default reasoning effort for new CODER agents; leave empty to require explicit configuration.
  reasoningEffort:
  # Optional default budget written when creating a new CODER agent without an explicit budget.
  budget:
    timeout: 3600
    maxSteps: 240
    tool:
      maxCalls: 200

acp-bridges:
  # ACP CODER bridge entries. Codex CLI settings stay in codex-acp-bridge.
  # codex:
  #   base-url: http://127.0.0.1:17071
  #   timeout-ms: 300000
  #   auth-token: ${CODEX_ACP_BRIDGE_AUTH_TOKEN:}

workspace-agents:
  # When enabled, CODER sessions read the workspace rules file from
  # <workspaceConfig.root>/<file> and inject it into the system prompt.
  enabled: true
  file: AGENTS.md

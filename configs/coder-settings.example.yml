# CODER-specific runtime settings.

default-agent:
  # Default modelKey written when creating a new CODER agent without an
  # explicit modelConfig.modelKey.
  modelKey: deepseek-v4-pro
  # Default reasoning effort written when creating a new CODER agent without
  # an explicit modelConfig.reasoning.effort.
  reasoningEffort: MEDIUM

acp-proxies:
  # ACP CODER bridge entries. Codex CLI/proxy settings stay in proxy-acp-codex.
  # codex:
  #   base-url: http://127.0.0.1:17071
  #   timeout: 300
  #   auth-token: ${CODEX_ACP_PROXY_TOKEN:}

workspace-agents:
  # When enabled, CODER sessions read the workspace rules file from
  # <workspaceConfig.root>/<file> and inject it into the system prompt.
  enabled: true
  file: AGENTS.md

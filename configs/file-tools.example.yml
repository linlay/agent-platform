# File tools preset. Runtime config is loaded from configs/file-tools.yml at startup.
# 目录权限统一放在 configs/access-policy.yml；这里仅保留大小限制、审批行为和 hook。

# file_read / file_grep / file_write / file_edit 使用的工作目录；相对路径会基于此目录解析。
working-directory: .

max-read-bytes: 1048576
max-write-bytes: 1048576
max-batch-ops: 20

# file_write / file_edit 开启时先走人工审批（fingerprint + ruleKey 双层）。
require-write-approval: true

# file_write / file_edit 前必须先 file_read，防止基于陈旧视图覆盖。
require-read-before-write: true

# 文件变更后自动 hook。file_write / file_edit 成功结果会返回 lineStats
#（addedLines / deletedLines / editedLines），hook 事件也会携带这份统计。
# v1 只收集 LSP diagnostics，不自动格式化或回滚写入。
hooks:
  after-file-change:
    lsp-diagnostics:
      enabled: true
      timeout-ms: 3000
      languages: ["go", "typescript", "javascript", "python", "rust"]
      servers:
        go:
          command: gopls
          args: []
        typescript:
          command: typescript-language-server
          args: ["--stdio"]
        javascript:
          command: typescript-language-server
          args: ["--stdio"]
        python:
          command: pyright-langserver
          args: ["--stdio"]
        rust:
          command: rust-analyzer
          args: []

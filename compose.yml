services:
  agent-platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-platform
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-11949}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      SERVER_PORT: 8080
      RUNTIME_DIR: /opt/runtime
      REGISTRIES_DIR: /opt/runtime/registries
      OWNER_DIR: /opt/runtime/owner
      AGENTS_DIR: /opt/runtime/agents
      TEAMS_DIR: /opt/runtime/teams
      ROOT_DIR: /opt/runtime/root
      AUTOMATIONS_DIR: /opt/runtime/automations
      CHATS_DIR: /opt/runtime/chats
      MEMORY_DIR: /opt/runtime/memory
      PAN_DIR: /opt/runtime/pan
      SKILLS_MARKET_DIR: /opt/runtime/skills-market
    volumes:
      - type: bind
        source: ./configs
        target: /opt/configs
        read_only: true
      - type: bind
        source: ${RUNTIME_DIR:-./runtime}
        target: /opt/runtime
      - type: bind
        source: ${REGISTRIES_DIR:-${RUNTIME_DIR:-./runtime}/registries}
        target: /opt/runtime/registries
      - type: bind
        source: ${CHATS_DIR:-${RUNTIME_DIR:-./runtime}/chats}
        target: /opt/runtime/chats
      - type: bind
        source: ${MEMORY_DIR:-${RUNTIME_DIR:-./runtime}/memory}
        target: /opt/runtime/memory
      - type: bind
        source: ${PAN_DIR:-${RUNTIME_DIR:-./runtime}/pan}
        target: /opt/runtime/pan

name: artifact_publish
label: 发布产物
description: Publish files as user-visible artifacts for the current run. You MUST call this tool whenever you have generated, exported, or assembled a file that the user asked for or would reasonably expect as a deliverable, including Markdown, documents, reports, images, spreadsheets, code packages, and archives. Do not merely mention the file path or paste the file contents when a requested deliverable file exists; publish the file with this tool, then summarize it briefly. This emits a single batched artifact.publish SSE event for all successfully published outputs from this invocation. Pass only the source path; the published file name, extension, and MIME type are derived from the path.
type: function
clientVisible: true
inputSchema:
  type: object
  properties:
    artifacts:
      type: array
      description: Required. List of artifacts to publish. Must not be empty.
      minItems: 1
      items:
        type: object
        properties:
          path:
            type: string
            description: Required. File path to publish. In the sandbox, this is typically a /workspace/... path or a path relative to the current chat working directory. The source file basename is always used as the published download filename.
          description:
            type: string
            description: Short description of this artifact.
        required:
          - path
        additionalProperties: false
  required:
    - artifacts
  additionalProperties: false

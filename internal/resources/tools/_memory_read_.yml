name: _memory_read_
label: 读取记忆
description: Read persisted agent memory, with optional filtering by ID, category, limit, and sort order.
type: function
clientVisible: false
inputSchema:
  type: object
  properties:
    id:
      type: string
      description: Memory ID to read. When provided, only that record is returned.
    category:
      type: string
      description: Category filter.
    limit:
      type: integer
      description: Maximum number of records to return. Defaults to 10.
    sort:
      type: string
      description: Sort order. Supported values are recent and importance. Defaults to recent.
  additionalProperties: false

name: _schedule_delete_
label: 删除定时任务
description: Delete a scheduled task by id. Only tasks owned by the current chat can be deleted; attempts to delete tasks from other chats are rejected.
type: function
clientVisible: false
inputSchema:
  type: object
  properties:
    id:
      type: string
      description: Required. Schedule id returned by _schedule_list_ or _schedule_create_.
  required:
    - id
  additionalProperties: false

name: _artifact_publish_
label: 发布产物
description: Publish multiple artifacts generated during the current run, emitting a separate artifact.publish SSE event for each one. Use this when files are created first and then explicitly declared as outputs of the run.
type: function
clientVisible: false
inputSchema:
  type: object
  properties:
    artifacts:
      type: array
      description: Required. List of artifacts to publish. Must not be empty.
      minItems: 1
      items:
        type: object
        properties:
          path:
            type: string
            description: Required. File path to publish. In the sandbox, this is typically a /workspace/... path or a path relative to the current chat working directory.
          name:
            type: string
            description: Custom display name for the artifact. Defaults to the source file name.
          description:
            type: string
            description: Short description of this artifact.
        required:
          - path
        additionalProperties: false
  required:
    - artifacts
  additionalProperties: false

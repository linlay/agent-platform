name: _ask_user_approval_
label: 用户确认
description: Unified approval entrypoint for user confirmations, including intercepted bash HITL flows. Builtin confirm flows submit approval questions with answer/value pairs, while html form flows submit a command for frontend parsing and return structured payload data on submit.
type: function
viewportType: builtin
viewportKey: confirm_dialog
clientVisible: true
submitResultFormat: kv
inputSchema:
  type: object
  properties:
    mode:
      type: string
      description: Required. Render mode for the shared confirm_dialog viewport.
      enum:
        - approval
    questions:
      type: array
      description: Optional. List of approval questions for builtin confirm-style approval prompts.
      items:
        type: object
        properties:
          question:
            type: string
            description: Required. Approval question text.
          header:
            type: string
            description: Title or short heading shown on the approval card.
          description:
            type: string
            description: Additional context for this approval request.
          options:
            type: array
            description: List of selectable approval options. answer uses the label and value uses the machine-readable value.
            items:
              type: object
              properties:
                label:
                  type: string
                  description: Required. Text shown for this option.
                value:
                  type: string
                  description: Required. Value submitted when this option is selected.
                description:
                  type: string
                  description: Additional explanation for this option.
              required:
                - label
                - value
              additionalProperties: false
          allowFreeText:
            type: boolean
            description: Whether the user may skip the predefined options and enter free text instead. This is mutually exclusive with option selection.
          freeTextPlaceholder:
            type: string
            description: Placeholder shown in free-text mode.
        required:
          - question
        additionalProperties: false
    viewportType:
      type: string
      description: Override the default viewportType, for example to switch HITL flows to an html view.
    viewportKey:
      type: string
      description: Override the default viewportKey, for example to switch HITL flows to a specific view.
    command:
      type: string
      description: Optional. Original command string for html form-style approval flows. The frontend parses and edits the payload client-side, then submits the updated payload back to the server.
  required:
    - mode
  additionalProperties: false

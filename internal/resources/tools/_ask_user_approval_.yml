name: _ask_user_approval_
label: 用户确认
description: Show a single-choice approval prompt to the user. The user can either choose from predefined options or enter free text, and the tool blocks until a response is submitted.
type: function
viewportType: builtin
viewportKey: confirm_dialog
clientVisible: true
submitResultFormat: kv
inputSchema:
  type: object
  properties:
    mode:
      type: string
      description: Required. Render mode for the shared confirm_dialog viewport.
      enum:
        - approval
    question:
      type: string
      description: Required. Approval question shown to the user.
    header:
      type: string
      description: Title shown on the approval card.
    description:
      type: string
      description: Additional context for this approval request.
    options:
      type: array
      description: Required. List of selectable approval options. The submitted result uses value.
      items:
        type: object
        properties:
          label:
            type: string
            description: Required. Text shown for this option.
          value:
            type: string
            description: Required. Value submitted when this option is selected.
          description:
            type: string
            description: Additional explanation for this option.
        required:
          - label
          - value
        additionalProperties: false
    allowFreeText:
      type: boolean
      description: Whether the user may skip the predefined options and enter free text instead. This is mutually exclusive with option selection.
    freeTextPlaceholder:
      type: string
      description: Placeholder shown in free-text mode.
    viewportType:
      type: string
      description: Override the default viewportType, for example to switch HITL flows to an html view.
    viewportKey:
      type: string
      description: Override the default viewportKey, for example to switch HITL flows to a specific view.
    payload:
      type: object
      description: Additional structured data passed to the frontend view.
  required:
    - mode
    - question
    - options
  additionalProperties: false

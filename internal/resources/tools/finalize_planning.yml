name: finalize_planning
label: 确认规划
description: Finalize the CODER planning-mode Markdown plan. This tool is only available during CODER planning mode and must be called exactly once when the plan is ready for user confirmation.
type: function
clientVisible: false
inputSchema:
  type: object
  properties:
    markdown:
      type: string
      description: Required. Complete Markdown plan following the active CODER planning prompt. Include one top-level heading and all required sections.
  required:
    - markdown
  additionalProperties: false

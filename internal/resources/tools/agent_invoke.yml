name: agent_invoke
label: 调度智能体
description: Dispatch 1 to 5 sub-agents in parallel, stream each sub-agent's activity live, and continue after all final answers are returned as one aggregated tool result.
type: function
clientVisible: true
inputSchema:
  type: object
  properties:
    tasks:
      type: array
      description: Required. Up to 5 sub-agent tasks to execute in parallel.
      minItems: 1
      maxItems: 5
      items:
        type: object
        properties:
          subAgentKey:
            type: string
            description: Required. Catalog key of the sub-agent to run.
          task:
            type: string
            description: Required. The exact task prompt to send to the sub-agent.
          taskName:
            type: string
            description: Optional. Short title shown in the task panel while the sub-agent is active.
          files:
            type: array
            description: Optional. Local files the sub-agent must inspect. Use explicit /workspace/... paths or current-chat resource URLs; PROXY sub-agents receive these as downloadable references.
            items:
              type: string
            maxItems: 10
        required:
          - subAgentKey
          - task
        additionalProperties: false
  required:
    - tasks
  additionalProperties: false

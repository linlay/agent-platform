name: write
label: 写入文件
description: Create or overwrite a single file on the host filesystem. This tool is intentionally narrow, Claude Code-style, and requires user approval by default.
submitResultFormat: json-compact
type: function
inputSchema:
  type: object
  properties:
    file_path:
      type: string
      description: Required. Absolute path, or a path relative to AGENT_FILE_WORKING_DIRECTORY, for the file to create or overwrite.
    content:
      type: string
      description: Required. Complete UTF-8 file contents to write. Existing file contents are replaced.
    description:
      type: string
      description: Required. 这次写文件的用途简述（一句话，中文），会在需要人工审批时展示给用户。
  required:
    - file_path
    - content
    - description
  additionalProperties: false

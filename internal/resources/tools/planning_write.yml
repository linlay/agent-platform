name: planning_write
label: 写入规划
description: Write the CODER planning-mode Markdown plan. This tool is only available during CODER planning mode and must be called exactly once when the plan is ready for user confirmation.
type: function
clientVisible: false
inputSchema:
  type: object
  properties:
    title:
      type: string
      description: Required. Short plain-text title for the plan. Do not include Markdown headings.
    markdown:
      type: string
      description: Required. Complete Markdown plan following the active CODER planning prompt. Include the title as the top-level heading.
  required:
    - title
    - markdown
  additionalProperties: false

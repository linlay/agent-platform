name: _memory_search_
label: 搜索记忆
description: Search persisted agent memory with FTS and optional hybrid vector retrieval.
type: function
clientVisible: false
inputSchema:
  type: object
  properties:
    query:
      type: string
      description: Required. Search query.
    category:
      type: string
      description: Category filter.
    limit:
      type: integer
      description: Maximum number of records to return. Defaults to 10.
  required:
    - query
  additionalProperties: false

name: file_write
label: 写入文件
description: |
  Create or overwrite a single UTF-8 file on the host filesystem. Prefer this tool for creating files, writing scripts, or replacing complete file contents when available.
  Do not use bash redirection, heredocs, cat/echo/printf/tee, or interpreter one-liners to write files when this tool is available.
  Existing files must be read in the same run before writing; external changes after read return file_modified_since_read. Successful results include lineStats with addedLines, deletedLines, and editedLines.
submitResultFormat: json-compact
type: function
inputSchema:
  type: object
  properties:
    file_path:
      type: string
      description: Required. Absolute path, or a path relative to the file-tools working-directory in configs/host-tools.yml, for the file to create or overwrite.
    content:
      type: string
      description: Required. Complete UTF-8 file contents to write. Existing file contents are replaced.
    description:
      type: string
      description: Required. 这次写文件的用途简述（一句话，中文），会在需要人工审批时展示给用户。
  required:
    - file_path
    - content
    - description
  additionalProperties: false

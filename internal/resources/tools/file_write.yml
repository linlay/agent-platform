name: file_write
label: 写入文件
description: |
  Create or overwrite a single text file on the host filesystem. Prefer this tool for creating files, writing scripts, or replacing complete file contents when available.
  Do not use bash redirection, heredocs, cat/echo/printf/tee, or interpreter one-liners to write files when this tool is available.
  Existing files must be fully read in the same run before writing; external changes after read return file_modified_since_read. Successful results include lineStats with addedLines, deletedLines, and editedLines.
  When encoding is omitted, existing non-UTF-8 text files keep their detected encoding; new files default to UTF-8.
submitResultFormat: json-compact
type: function
inputSchema:
  type: object
  properties:
    file_path:
      type: string
      description: Required. Absolute path, or a path relative to the file-tools working-directory in configs/tools.yml, for the file to create or overwrite.
    content:
      type: string
      description: Required. Complete text contents to write. Existing file contents are replaced.
    encoding:
      type: string
      description: Optional. Target encoding. When omitted, existing non-UTF-8 text files keep their detected encoding and new files default to utf-8. Supports utf-8, gb18030/gbk, big5, shift_jis, euc-kr, common Windows-125x, and common OEM code pages such as cp437/cp850/cp866.
    description:
      type: string
      description: Optional. 这次写文件的用途简述（一句话，中文），会在需要人工审批时展示给用户。
  required:
    - file_path
    - content
  additionalProperties: false

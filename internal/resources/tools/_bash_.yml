name: _bash_
label: 执行命令（宿主机）
description: Run allowlisted bash commands on the host. Strict mode is used by default, with optional support for advanced shell syntax such as pipes, redirection, and here-doc.
type: function
inputSchema:
  type: object
  properties:
    command:
      type: string
      description: Required. Command string. Strict mode supports only a single command by default; when shell-features-enabled is enabled, advanced syntax such as pipes, redirection, and here-doc is also allowed.
  required:
    - command
  additionalProperties: false

name: _bash_
label: 执行命令（宿主机）
description: Run allowlisted bash commands on the host. Strict mode is used by default, with optional support for advanced shell syntax such as pipes, redirection, and here-doc. When calling this tool, always include a short Chinese description explaining the command purpose.
submitResultFormat: json-compact
type: function
inputSchema:
  type: object
  properties:
    command:
      type: string
      description: Required. Command string. Strict mode supports only a single command by default; when shell-features-enabled is enabled, advanced syntax such as pipes, redirection, and here-doc is also allowed.
    description:
      type: string
      description: Required. 这条命令的用途简述（一句话，中文），会在需要人工审批时展示给用户。
  required:
    - command
    - description
  additionalProperties: false

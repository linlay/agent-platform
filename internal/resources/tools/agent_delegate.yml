name: agent_delegate
label: 委派团队成员
description: Delegate work to one or more agents in the current Team.
type: function
clientVisible: false
explicitOnly: true
internalOnly: true
catalogVisible: false
inputSchema:
  type: object
  additionalProperties: false
  required:
    - tasks
  properties:
    tasks:
      type: array
      minItems: 1
      description: Required. Members and work to delegate in this execution batch.
      items:
        type: object
        additionalProperties: false
        required:
          - agentKey
        properties:
          agentKey:
            type: string
            description: Required. Exact agentKey from the frozen Team roster.
          task:
            type: string
            description: Optional. Task prompt. Defaults to the original user request.
          taskName:
            type: string
            description: Optional. Task title used for progress events.
          files:
            type: array
            maxItems: 10
            description: Optional. Additional files or current-chat resources.
            items:
              type: string

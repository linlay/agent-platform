name: kbase_search
label: 搜索知识库
description: Search the current KBASE agent knowledge base. Results include source paths, line/page/slide ranges, snippets, scores, and match type.
submitResultFormat: json-compact
type: function
clientVisible: true
inputSchema:
  type: object
  properties:
    query:
      type: string
      description: Required. Search query.
    limit:
      type: integer
      description: Maximum number of chunks to return. Defaults to the agent retrieval topK.
  required:
    - query
  additionalProperties: false

name: kbase_search
label: 搜索知识库
description: Search the current KBASE agent knowledge base. Results include source paths, line/page/slide ranges, snippets, scores, and match type.
tags: [knowledge-base, search]
submitResultFormat: json-compact
type: function
clientVisible: true
readOnly: true
inputSchema:
  type: object
  properties:
    query:
      type: string
      description: Required. Search query.
    limit:
      type: integer
      description: Maximum number of chunks to return. Defaults to the agent retrieval topK.
    offset:
      type: integer
      description: Number of sorted matching chunks to skip before applying limit.
    pathPrefix:
      type: string
      description: Workspace-relative path prefix to search within, such as docs/.
    pathGlob:
      type: string
      description: KBASE glob matched against workspace-relative indexed paths. Supports *, ?, and **.
    type:
      type: string
      description: Optional file extension filter such as md or .pdf.
  required:
    - query
  additionalProperties: false

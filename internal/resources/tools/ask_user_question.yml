name: ask_user_question
label: 向用户提问
description: Show multiple questions to the user, supporting text, number, password, and select-style answers. Each question can use either option selection or free text, and the tool blocks until the user submits a response.
type: function
viewportType: builtin
viewportKey: question_dialog
clientVisible: true
submitResultFormat: qa
inputSchema:
  type: object
  properties:
    mode:
      type: string
      description: Required. Render mode for the built-in question dialog.
      enum:
        - question
    questions:
      type: array
      description: Required. List of questions to present to the user in a single prompt. Every item must include `question` and `type`. For free-input prompts, use `type=text`, `number`, or `password`; do not send a free-input question that only sets `allowFreeText`. Use `type=select` for single-choice option picking and `type=multi-select` for multiple selections.
      items:
        type: object
        properties:
          question:
            type: string
            description: Required. Main question text.
          type:
            type: string
            description: Required. Every question must provide a type. Use text, number, or password for free input. Use select for single-choice option picking and multi-select for multiple selections. Select-style questions may additionally allow free input through allowFreeText.
            enum:
              - text
              - number
              - select
              - multi-select
              - password
          header:
            type: string
            description: Group title or short heading for the question.
          placeholder:
            type: string
            description: Placeholder shown in the input field.
          options:
            type: array
            description: Required for select and multi-select questions. Option list used only when type is select or multi-select.
            minItems: 1
            items:
              type: object
              properties:
                label:
                  type: string
                  description: Required. Text shown for this option. This is also the submitted value.
                description:
                  type: string
                  description: Additional explanation for this option.
              required:
                - label
              additionalProperties: false
          allowFreeText:
            type: boolean
            description: Only applies when `type=select` or `type=multi-select`. When enabled, the user may answer with free text instead of selecting an option. This is mutually exclusive with option selection and should not be used on text, number, or password questions.
          freeTextPlaceholder:
            type: string
            description: Only applies when `type=select` or `type=multi-select` with `allowFreeText=true`. Placeholder for the free-text input shown in that select-style question.
        required:
          - question
          - type
        allOf:
          -
            if:
              properties:
                type:
                  enum:
                    - select
                    - multi-select
            then:
              required:
                - options
        additionalProperties: false
  required:
    - mode
    - questions
  additionalProperties: false

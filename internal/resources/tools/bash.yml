name: bash
label: 执行命令
description: |
  Run allowlisted host shell commands. Windows runs through PowerShell by default; Unix/macOS run through bash/sh.
  Use bash for running commands, tests, builds, package managers, git, and other terminal operations. When file_write/file_edit are available, create or edit files with those tools first, then use bash only to run them.
  Use the cwd parameter for directory changes; do not inline `cd /path && ...` when cwd can express the target directory.
  Shell syntax may be available, but security policy can block control operators, redirections, substitutions, and opaque scripts.
  Avoid writing commands like `cd /path && command`, `cmd1; cmd2`, `cmd1 && cmd2`, `cmd1 || cmd2`, `cmd1 | cmd2`, `cmd > file`, `cmd 2>&1`, `cmd >/dev/null 2>&1`, `$(cmd)`, backticks, heredocs, `eval`, `source`, or background jobs with `&`.
  When calling this tool, always include a short Chinese description explaining the command purpose.
submitResultFormat: json-compact
type: function
inputSchema:
  type: object
  properties:
    command:
      type: string
      description: Required. Host shell command. Prefer a single executable command. Use cwd for working directory changes instead of `cd /path && ...`. Avoid shell control operators, pipes, redirections, command substitutions, heredocs, eval/source, and background jobs unless strictly required.
    description:
      type: string
      description: Required. 这条命令的用途简述（一句话，中文），会在需要人工审批时展示给用户。
    cwd:
      type: string
      description: Working directory for this execution. When empty, the host shell working directory default is used.
    timeout_ms:
      type: integer
      description: Execution timeout in milliseconds.
  required:
    - command
    - description
  additionalProperties: false

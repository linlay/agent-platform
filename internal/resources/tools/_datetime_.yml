name: _datetime_
label: 日期时间
description: Get the current or offset date and time with optional timezone and chained offset support. The output also includes the lunar calendar.
type: function
inputSchema:
  type: object
  properties:
    timezone:
      type: string
      description: Timezone to use. Supports IANA zoneId values and offset formats such as UTC+8, +08:00, and Z.
    offset:
      type: string
      description: Chained time offset, for example +1D, +1D-3H+20m, +10M+25D, -2y, or +3w. Here y=year, M=month, D=day, H=hour, and m=minute. Leave blank or use 0 for the current time.
  additionalProperties: false

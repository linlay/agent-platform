name: _plan_add_tasks_
label: 创建任务
description: Create plan tasks in append mode, supporting multiple tasks in a single call. Each task must include a description, and success returns multi-line text in the format taskId | status | description.
type: function
clientVisible: true
inputSchema:
  type: object
  properties:
    tasks:
      type: array
      description: Required. List of tasks to create. Each item contains one task description.
      items:
        type: object
        properties:
          description:
            type: string
            description: Required. Task description explaining the work that needs to be completed.
        required:
          - description
        additionalProperties: false
  required:
    - tasks
  additionalProperties: false

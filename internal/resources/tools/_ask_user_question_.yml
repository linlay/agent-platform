name: _ask_user_question_
label: 向用户提问
description: Show multiple questions to the user, supporting text, number, password, and select-style answers. Each question can use either option selection or free text, and the tool blocks until the user submits a response.
type: function
viewportType: builtin
viewportKey: confirm_dialog
clientVisible: true
submitResultFormat: qa
inputSchema:
  type: object
  properties:
    mode:
      type: string
      description: Required. Render mode for the shared confirm_dialog viewport.
      enum:
        - question
    questions:
      type: array
      description: Required. List of questions to present to the user in a single prompt.
      items:
        type: object
        properties:
          question:
            type: string
            description: Required. Main question text.
          type:
            type: string
            description: Required. Question type. text, number, and password use free input; select uses option selection. select can additionally allow free input through allowFreeText.
            enum:
              - text
              - number
              - select
              - password
          header:
            type: string
            description: Group title or short heading for the question.
          placeholder:
            type: string
            description: Placeholder shown in the input field.
          options:
            type: array
            description: Required for select questions. Option list used only when type is select.
            minItems: 1
            items:
              type: object
              properties:
                label:
                  type: string
                  description: Required. Text shown for this option. This is also the submitted value.
                description:
                  type: string
                  description: Additional explanation for this option.
              required:
                - label
              additionalProperties: false
          multiSelect:
            type: boolean
            description: Whether a select question allows multiple selections.
          allowFreeText:
            type: boolean
            description: Only applies to select questions. When enabled, the user may answer with free text instead of selecting an option. This is mutually exclusive with option selection.
          freeTextPlaceholder:
            type: string
            description: Placeholder for free-text input when type is select and allowFreeText=true.
        required:
          - question
          - type
        allOf:
          -
            if:
              properties:
                type:
                  const: select
            then:
              required:
                - options
        additionalProperties: false
  required:
    - mode
    - questions
  additionalProperties: false

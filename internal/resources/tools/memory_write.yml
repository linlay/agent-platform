name: memory_write
label: 写入记忆
description: Write persisted agent memory with semantic category, importance, and tags.
type: function
clientVisible: false
inputSchema:
  type: object
  properties:
    content:
      type: string
      description: Required. Memory content.
    category:
      type: string
      description: Category to store with the memory. Prefer preference, constraint, profile, workflow, decision, glossary, unresolved_issue, bugfix, todo, project, or remember. Defaults to general.
    importance:
      type: integer
      description: Importance level from 1 to 10. Defaults to 5.
    tags:
      type: array
      description: List of tags to attach to the memory.
      items:
        type: string
  required:
    - content
  additionalProperties: false

name: plan_add_tasks
label: 创建任务
description: Create plan tasks, supporting multiple tasks in a single call. Defaults to appending tasks to the current plan. Use mode=new only when starting a distinct new plan; this creates a new planId and makes the provided tasks the complete initial task list for that plan. Each task must include a description, and success returns multi-line text in the format taskId | status | description.
type: function
clientVisible: true
inputSchema:
  type: object
  properties:
    mode:
      type: string
      enum:
        - append
        - new
      description: Optional. Defaults to append. Use new only when starting a distinct new plan; it creates a new planId and discards the previous plan tasks from the current plan state.
    tasks:
      type: array
      description: Required. List of tasks to create. Each item contains one task description.
      items:
        type: object
        properties:
          description:
            type: string
            description: Required. Task description explaining the work that needs to be completed.
        required:
          - description
        additionalProperties: false
  required:
    - tasks
  additionalProperties: false

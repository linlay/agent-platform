name: _sandbox_bash_
label: 执行命令
description: Execute a command inside the sandbox container. When calling this tool, always include a short Chinese description explaining the command purpose.
submitResultFormat: json-compact
type: builtin
inputSchema:
  type: object
  properties:
    command:
      type: string
      description: Required. Command string to execute inside the sandbox container via /bin/sh -lc.
    description:
      type: string
      description: Required. 这条命令的用途简述（一句话，中文），会在需要人工审批时展示给用户。
    cwd:
      type: string
      description: Working directory for this execution. When empty, the current run's default sandbox cwd is used.
    timeout_ms:
      type: integer
      description: Execution timeout in milliseconds.
  required:
    - command
    - description
  additionalProperties: false

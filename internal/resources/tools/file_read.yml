name: file_read
label: 读取文件
description: Read a single file from the host filesystem. Use this before editing or inspecting file contents; this tool is read-only and does not require approval. PNG/JPEG/WebP/GIF images return base64 image payloads, known binary/device files are rejected, and repeated reads in the same run may return file_unchanged.
submitResultFormat: json-compact
type: function
inputSchema:
  type: object
  properties:
    file_path:
      type: string
      description: Required. Absolute path, or a path relative to the file-tools working-directory in configs/tools.yml, for the file to read.
    offset:
      type: integer
      description: One-based line number to start reading from. Defaults to the beginning of the file.
    limit:
      type: integer
      description: Maximum number of lines to return. When omitted, content is limited by file-tools.max-read-bytes in configs/tools.yml.
    add_line_numbers:
      type: boolean
      default: false
      description: Add cat -n style line numbers to UTF-8 text output. Defaults to false.
    encoding:
      type: string
      description: Optional. Decode text with a specific encoding when automatic detection is wrong. Supports utf-8, gb18030/gbk, big5, shift_jis, euc-kr, common Windows-125x, and common OEM code pages such as cp437/cp850/cp866.
  required:
    - file_path
  additionalProperties: false

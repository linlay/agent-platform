name: _invoke_agents_
label: 并发调度子 Agent
description: Dispatch 1 to 3 sub-agents in parallel, stream each sub-agent's activity live, and continue after all final answers are returned as one aggregated tool result.
type: function
clientVisible: true
inputSchema:
  type: object
  properties:
    tasks:
      type: array
      minItems: 1
      maxItems: 3
      items:
        type: object
        properties:
          subAgentKey:
            type: string
            description: Required. Catalog key of the sub-agent to run.
          task:
            type: string
            description: Required. The exact task prompt to send to the sub-agent.
          taskName:
            type: string
            description: Optional. Short title shown in the task panel while the sub-agent is active.
        required:
          - subAgentKey
          - task
        additionalProperties: false
  required:
    - tasks
  additionalProperties: false

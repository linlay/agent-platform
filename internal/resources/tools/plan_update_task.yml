name: plan_update_task
label: 更新任务
description: "Update the status or description of a task in the current plan. status supports init, in_progress, completed, failed, and canceled. On success it returns OK; on failure it returns a failure reason."
type: function
clientVisible: true
inputSchema:
  type: object
  properties:
    taskId:
      type: string
      description: Required. taskId of the task to update.
    status:
      type: string
      description: Required. New task status. Supported values are init, in_progress, completed, failed, and canceled.
      enum:
        - init
        - in_progress
        - completed
        - failed
        - canceled
    description:
      type: string
      description: Optional updated task description. Only provide this when the description itself needs to change.
  required:
    - taskId
    - status
  additionalProperties: false

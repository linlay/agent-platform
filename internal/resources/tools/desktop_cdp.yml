name: desktop_cdp
label: 桌面端CDP
description: Call the local Desktop CDP Bridge to execute Chrome DevTools Protocol methods on Desktop-managed targets.
submitResultFormat: json-compact
type: function
inputSchema:
  type: object
  properties:
    method:
      type: string
      description: Required. Chrome DevTools Protocol method name to execute through the Desktop CDP Bridge. Use a Domain.method value such as Target.getTargets, Runtime.evaluate, or Page.captureScreenshot. Do not pass HTTP gateway endpoints such as /json/version, /json, or /json/list as method values.
      enum:
        - Target.getTargets
        - Target.getCurrentTarget
        - Page.bringToFront
        - Page.enable
        - Page.navigate
        - Page.reload
        - Page.captureScreenshot
        - Runtime.evaluate
        - DOM.getDocument
        - DOM.querySelector
        - DOM.querySelectorAll
        - DOM.getOuterHTML
        - DOM.getBoxModel
        - Input.dispatchMouseEvent
        - Input.dispatchKeyEvent
        - Input.insertText
        - Network.enable
        - Network.disable
    params:
      type: object
      description: JSON parameters for the selected CDP method. Use native JSON value types; for example Runtime.evaluate returnByValue and awaitPromise must be booleans true/false, not strings "true"/"false".
      additionalProperties: true
    targetId:
      type: string
      description: Optional Desktop-managed target id to route the CDP call to.
    sessionId:
      type: string
      description: Optional CDP session id for an attached target session.
    surfaceId:
      type: string
      description: Optional Desktop surface id used when Desktop needs to resolve the active target.
    requestId:
      type: string
      description: Optional stable request id for audit/debug correlation. Leave blank to let Desktop generate one.
  required:
    - method
  additionalProperties: false

name: file_glob
label: 查找文件
description: |
  Find files by path/name glob without reading file contents. Use this when
  you know part of a filename, extension, or directory pattern and need matching
  paths, not content matches.
submitResultFormat: json-compact
type: function
inputSchema:
  type: object
  properties:
    pattern:
      type: string
      description: Required. Ripgrep-style glob pattern to match file paths, such as '*.go', '**/*.{ts,tsx}', or 'internal/**/*.go'.
    path:
      type: string
      description: Directory to search. Defaults to the file-tools working-directory in configs/tools.yml.
    head_limit:
      type: integer
      description: Maximum number of matching paths to return after offset. Defaults to 100; 0 means unlimited.
    offset:
      type: integer
      description: Number of matching paths to skip before applying head_limit.
  required:
    - pattern
  additionalProperties: false

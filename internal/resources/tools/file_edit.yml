name: file_edit
label: 编辑文件
description: |
  Edit a single text file on the host filesystem by replacing an exact string. Prefer this tool for modifying existing files when available; use file_write for full overwrites.
  Do not use bash redirection, heredocs, cat/echo/printf/tee, or interpreter one-liners to edit files when this tool is available.
  Existing files must be fully read in the same run before editing; external changes after read return file_edit_modified_since_read. Successful results include lineStats with addedLines, deletedLines, and editedLines.
  Existing text files keep their detected encoding when it is UTF-8, gb18030/gbk, or the current Windows ACP unless encoding is supplied.
submitResultFormat: json-compact
type: function
inputSchema:
  type: object
  properties:
    file_path:
      type: string
      description: Required. Absolute path, or a path relative to the file-tools working-directory in configs/tools.yml, for the file to edit.
    old_string:
      type: string
      description: Required. Exact UTF-8 text to replace. Use an empty string only to create a new file or write an empty existing file.
    new_string:
      type: string
      description: Required. Replacement text.
    replace_all:
      type: boolean
      default: false
      description: Replace every occurrence of old_string. Defaults to false; when false, old_string must match exactly once.
    encoding:
      type: string
      description: Optional. Override the file encoding when automatic detection is wrong. Automatic detection only covers utf-8, gb18030/gbk, and the current Windows ACP. Explicit values also support big5, shift_jis, euc-kr, common Windows-125x, and OEM code pages such as cp437/cp850/cp866.
    description:
      type: string
      description: Optional. 这次编辑文件的用途简述（一句话，中文），会在需要人工审批时展示给用户。
  required:
    - file_path
    - old_string
    - new_string
  additionalProperties: false
